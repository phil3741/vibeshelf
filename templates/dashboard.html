<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#A8A8A8">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<title>VibeShelf</title>
<style>
/* ── iTunes 2008 Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Lucida Grande', 'Segoe UI', 'Trebuchet MS', sans-serif;
  font-size: 11px;
  color: #1A1A1A;
  background: #808080;
  -webkit-font-smoothing: subpixel-antialiased;
  -moz-osx-font-smoothing: auto;
}

/* ── Window Frame ── */
#itunes-window {
  display: flex; flex-direction: column;
  height: 100vh; width: 100vw;
  border: 1px solid #5A5A5A;
  border-radius: 5px;
  overflow: hidden;
  box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  background: #fff;
}

/* ── Toolbar ── */
#toolbar {
  height: 72px; min-height: 72px;
  background: linear-gradient(to bottom, #EBEBEB 0px, #D0D0D0 1px, #A8A8A8 100%);
  border-bottom: 1px solid #5A5A5A;
  display: flex; align-items: center;
  padding: 0 12px;
  gap: 12px;
  position: relative;
  user-select: none;
}

/* Traffic lights (decorative) */
.traffic-lights { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.traffic-light {
  width: 12px; height: 12px; border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.2);
}
.tl-red { background: radial-gradient(circle at 35% 35%, #FF6059, #EC3F38); border-color: #CF2017; }
.tl-yellow { background: radial-gradient(circle at 35% 35%, #FFC233, #E5A117); border-color: #C68A0E; }
.tl-green { background: radial-gradient(circle at 35% 35%, #29CE42, #17A82C); border-color: #0F8A20; }

/* Playback controls tray */
.controls-tray {
  display: flex; align-items: center; gap: 2px;
  background: linear-gradient(to bottom, #BEBEBE, #A0A0A0);
  border: 1px solid #808080;
  border-top-color: #C8C8C8;
  border-radius: 5px;
  padding: 3px 6px;
  flex-shrink: 0;
}
.ctrl-btn {
  background: none; border: none; cursor: default;
  color: #4A4A4A; font-size: 14px; line-height: 1;
  padding: 2px 5px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 3px; min-width: 22px; height: 22px;
}
.ctrl-btn:active { transform: translateY(1px); }
.ctrl-btn svg { width: 12px; height: 12px; }
#ctrl-play svg { width: 14px; height: 14px; }
.ctrl-sep {
  width: 1px; height: 14px; background: #909090; margin: 0 2px; opacity: 0.5;
}

/* LCD Display */
#lcd {
  flex: 0 1 320px; min-width: 180px; height: 36px; cursor: pointer;
  background: linear-gradient(to bottom, #E8DFCF, #D8CDB8);
  border-radius: 10px;
  border: 1px solid #A09880;
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.12), 0 1px 0 rgba(255,255,255,0.4);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin: 0 auto;
  overflow: hidden;
  padding: 0 12px;
}
#lcd-title {
  font-size: 11px; font-weight: bold; color: #3A3020;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 100%; text-align: center; line-height: 1.2;
}
#lcd-subtitle {
  font-size: 10px; color: #6A5D48;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 100%; text-align: center; line-height: 1.2;
}
#lcd-bar {
  width: 80%; height: 5px; background: #B8AD98; border-radius: 2px; margin-top: 2px;
  overflow: hidden; cursor: pointer; position: relative;
}
#lcd-bar-fill { height: 100%; width: 0%; background: #7A9A5A; border-radius: 2px; transition: width 0.15s linear; }
#nd-audio { display: none; }
tr.now-playing td { font-weight: bold; }
.ctrl-btn.is-playing { color: #1DB954 !important; }
.ctrl-btn.repeat-active { opacity: 1 !important; color: #2565C1 !important; }
.ctrl-btn.shuffle-active { opacity: 1 !important; color: #2565C1 !important; }

/* View buttons (segmented) */
.view-seg {
  display: flex; flex-shrink: 0;
  border: 1px solid #8A8A8A; border-radius: 3px; overflow: hidden;
}
.view-btn {
  width: 26px; height: 22px; border: none; cursor: pointer;
  background: linear-gradient(to bottom, #D0D0D0, #B0B0B0);
  color: #8A8A8A; font-size: 10px; line-height: 22px; text-align: center;
  border-right: 1px solid #8A8A8A;
  padding: 0;
}
.view-btn:last-child { border-right: none; }
.view-btn.active {
  background: linear-gradient(to bottom, #A0A0A0, #888);
  color: #4A4A4A; font-weight: bold;
}

/* Search capsule */
#search-wrap {
  position: relative; flex-shrink: 0;
}
#search {
  width: 170px; height: 22px;
  border: 1px solid #9A9A9A; border-radius: 11px;
  background: #fff; padding: 0 24px 0 22px;
  font-size: 11px; font-family: inherit;
  outline: none;
}
#search:focus { box-shadow: 0 0 4px #6BB5F5; border-color: #6BB5F5; }
#search-icon {
  position: absolute; left: 7px; top: 4px;
  color: #808080; font-size: 12px; pointer-events: none;
}
#search-clear {
  position: absolute; right: 5px; top: 2px;
  color: #999; font-size: 13px; cursor: pointer;
  display: none; background: none; border: none; font-family: inherit; line-height: 18px;
}

/* Hamburger (mobile) */
#hamburger {
  display: none; background: none; border: none; font-size: 18px;
  color: #4A4A4A; cursor: pointer; flex-shrink: 0; padding: 4px;
}

/* ── Main Area (sidebar + content) ── */
#main-area {
  display: flex; flex: 1; overflow: hidden;
}

/* ── Source List (Sidebar) ── */
#sidebar {
  width: 175px; min-width: 175px; flex-shrink: 0;
  background: linear-gradient(to bottom, #D4DCE4, #B8C3CF);
  border-right: 1px solid #6F7F8C;
  display: flex; flex-direction: column;
  overflow: hidden;
  user-select: none;
}
#sidebar-list {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 6px 0;
}
.sb-section {
  font-size: 10px; font-weight: 700; color: #6A7A8A;
  text-transform: uppercase; letter-spacing: 0.05em;
  padding: 8px 12px 3px 12px;
  text-shadow: 0 1px 0 rgba(255,255,255,0.6);
}
.sb-item {
  display: flex; align-items: center; gap: 4px;
  height: 22px; padding: 0 8px 0 12px;
  font-size: 11px; color: #1A1A1A;
  text-shadow: 0 1px 0 rgba(255,255,255,0.5);
  cursor: default; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  border: 1px solid transparent;
}
.sb-item:hover { background: rgba(74,139,218,0.1); }
.sb-item.active {
  background: linear-gradient(to bottom, #4A8BDA, #2565C1);
  border-top-color: #5898E2; border-bottom-color: #1C52A5;
  color: #fff;
  text-shadow: 0 1px 0 #1A4A9A;
  border-radius: 1px;
}
.sb-icon { width: 16px; text-align: center; flex-shrink: 0; font-size: 12px; }
.sb-item.active .sb-icon { filter: brightness(2); }
.sb-label { overflow: hidden; text-overflow: ellipsis; }
.sb-count {
  margin-left: auto; font-size: 10px; color: #6A7A8A;
  text-shadow: none;
}
.sb-item.active .sb-count { color: rgba(255,255,255,0.7); }

/* Disclosure triangle */
.sb-disclosure {
  display: flex; align-items: center; gap: 4px;
  height: 22px; padding: 0 8px 0 8px;
  font-size: 11px; color: #1A1A1A;
  text-shadow: 0 1px 0 rgba(255,255,255,0.5);
  cursor: default; font-weight: 600;
}
.sb-disclosure .arrow {
  font-size: 8px; color: #6A7A8A; transition: transform 0.15s;
  display: inline-block; width: 10px; text-align: center;
}
.sb-disclosure.open .arrow { transform: rotate(90deg); }
.sb-collapse { overflow: hidden; }
.sb-collapse.collapsed { display: none; }

/* Album art in sidebar */
#sidebar-art {
  width: 100%; aspect-ratio: 1; flex-shrink: 0;
  background: #C0C8D0;
  border-top: 1px solid #6F7F8C;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
#sidebar-art img { width: 100%; height: 100%; object-fit: cover; }
#sidebar-art .placeholder { font-size: 48px; color: #8A9AAA; }

/* Resize handles */
#sidebar-resize {
  position: absolute; right: 0; top: 0; bottom: 0; width: 4px;
  cursor: col-resize; z-index: 5;
}
#sidebar-resize:hover, #sidebar-resize.dragging { background: rgba(74,139,218,0.3); }
#sidebar { position: relative; }
.browser-col { position: relative; }
.browser-col-resize {
  position: absolute; right: -2px; top: 0; bottom: 0; width: 4px;
  cursor: col-resize; z-index: 3;
}
.browser-col-resize:hover, .browser-col-resize.dragging { background: rgba(74,139,218,0.3); }
#browser-v-resize {
  height: 4px; cursor: row-resize; position: relative; z-index: 3;
  margin-top: -4px;
}
#browser-v-resize:hover, #browser-v-resize.dragging { background: rgba(74,139,218,0.3); }
.th-resize {
  position: absolute; right: -2px; top: 0; bottom: 0; width: 4px;
  cursor: col-resize; z-index: 3;
}
.th-resize:hover { background: rgba(74,139,218,0.3); }

/* ── Content Area ── */
#content {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  background: #fff;
}

/* ── Browser Pane (Genre | Artist | Album) ── */
#browser {
  display: flex; height: 170px; min-height: 0;
  border-bottom: 1px solid #B0B0B0;
  background: #fff;
}
#browser.hidden { display: none; }
#browser.hidden + #browser-v-resize { display: none; }
.browser-col {
  flex: 1; display: flex; flex-direction: column;
  border-right: 1px solid #B0B0B0; overflow: hidden;
}
.browser-col:last-child { border-right: none; }
.browser-header {
  height: 19px; min-height: 19px;
  background: linear-gradient(to bottom, #fff, #F0F0F0, #DCDCDC);
  border-bottom: 1px solid #B0B0B0;
  font-size: 10px; font-weight: 600; color: #4A4A4A;
  display: flex; align-items: center; padding: 0 6px;
}
.browser-list {
  flex: 1; overflow-y: auto; overflow-x: hidden;
}
.browser-item {
  height: 18px; line-height: 18px; padding: 0 6px;
  font-size: 11px; cursor: default;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.browser-item:nth-child(odd) { background: #fff; }
.browser-item:nth-child(even) { background: #ECF2F8; }
.browser-item:hover { background: #D4E4F7; }
.browser-item.active {
  background: linear-gradient(to bottom, #4A8BDA, #2565C1);
  color: #fff;
}
.browser-item.all-item { color: #6A7A8A; }
.browser-item.active.all-item { color: #fff; }

/* ── Track Table ── */
#table-wrap { flex: 1; overflow: auto; position: relative; }
#track-table {
  width: 100%; border-collapse: collapse; table-layout: fixed;
}
#track-table thead { position: sticky; top: 0; z-index: 2; }
#track-table th {
  height: 19px;
  background: linear-gradient(to bottom, #fff, #F0F0F0, #DCDCDC);
  border-bottom: 1px solid #B0B0B0;
  font-size: 10px; font-weight: 400; color: #4A4A4A;
  text-align: left; padding: 0 4px;
  cursor: pointer; position: relative;
  white-space: nowrap; overflow: visible;
  border-right: 1px solid #D0D0D0;
  user-select: none;
}
#track-table th:last-child { border-right: none; }
#track-table th:hover { background: linear-gradient(to bottom, #E8E8E8, #D0D0D0, #C0C0C0); }
#track-table th.sorted {
  background: linear-gradient(to bottom, #E8F0FA, #D8E8F5, #C8D8EC);
}
.sort-arrow { font-size: 7px; margin-left: 2px; color: #6A6A6A; }
#track-table td {
  height: 18px; padding: 0 4px;
  font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  border-right: 1px solid #E0E0E0;
}
#track-table td:last-child { border-right: none; }
#track-table tr.row-odd td { background: #fff; }
#track-table tr.row-even td { background: #ECF2F8; }
#track-table tbody tr:hover td { background: #D4E4F7; }
#track-table tbody tr.selected td {
  background: linear-gradient(to bottom, #3F80E0, #1A5BC0) !important;
  color: #fff;
  border-right-color: #2A6AC0;
}

/* Column widths */
.col-src { width: 28px; text-align: center; padding: 0 1px; white-space: nowrap; }
.col-src svg { width: 12px; height: 12px; vertical-align: middle; }
.col-num { width: 32px; text-align: right; }
.col-name { width: auto; }
.col-time { width: 50px; text-align: right; }
.col-artist { width: 18%; }
.col-album { width: 18%; }
.col-genre { width: 10%; }
.col-year { width: 45px; text-align: center; }

/* ── Special Views (non-table content) ── */
#special-view {
  flex: 1; overflow-y: auto; padding: 0;
  display: none; background: #fff;
}
#special-view.active { display: block; }
.sv-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
}
.sv-card {
  display: flex; gap: 8px; padding: 8px;
  background: #F5F5F5; border: 1px solid #D0D0D0; border-radius: 4px;
  cursor: default; overflow: hidden;
}
.sv-card:hover { background: #ECF2F8; }
.sv-card img { width: 48px; height: 48px; border-radius: 3px; flex-shrink: 0; }
.sv-card-info { min-width: 0; }
.sv-card-title { font-weight: 600; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sv-card-sub { font-size: 10px; color: #6A7A8A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
/* Status cards */
.status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-bottom: 16px; }
.status-card {
  padding: 10px; background: #F5F5F5; border: 1px solid #D0D0D0; border-radius: 4px;
}
.status-card .label { font-size: 10px; color: #6A7A8A; text-transform: uppercase; font-weight: 600; }
.status-card .value { font-size: 18px; font-weight: 700; color: #2565C1; margin-top: 2px; }
.status-card .detail { font-size: 10px; color: #8A8A8A; margin-top: 2px; }
.status-dot-g { color: #29CE42; }
.status-dot-r { color: #EC3F38; }
.status-dot-y { color: #E5A117; }

/* iTunes-style tables for special views */
.sv-table {
  width: 100%; border-collapse: collapse; table-layout: fixed;
}
.sv-table thead th {
  height: 19px;
  background: linear-gradient(to bottom, #fff, #F0F0F0, #DCDCDC);
  border-bottom: 1px solid #B0B0B0;
  border-right: 1px solid #D0D0D0;
  font-size: 10px; font-weight: 400; color: #4A4A4A;
  text-align: left; padding: 0 4px;
  white-space: nowrap; position: sticky; top: 0; z-index: 1;
}
.sv-table thead th:last-child { border-right: none; }
.sv-table td {
  height: 18px; padding: 0 4px;
  font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  border-right: 1px solid #E0E0E0;
}
.sv-table td:last-child { border-right: none; }
.sv-table tr:nth-child(odd) td { background: #fff; }
.sv-table tr:nth-child(even) td { background: #ECF2F8; }
.sv-table tbody tr:hover td { background: #D4E4F7; }
.sv-table tbody tr.selected td {
  background: linear-gradient(to bottom, #3F80E0, #1A5BC0) !important;
  color: #fff; border-right-color: #2A6AC0;
}
.sv-toolbar {
  display: flex; gap: 0; padding: 6px 8px; border-bottom: 1px solid #D0D0D0;
  background: linear-gradient(to bottom, #F5F5F5, #E0E0E0);
}
.sv-seg-btn {
  padding: 2px 10px; border: 1px solid #8A8A8A; border-right: none;
  background: linear-gradient(to bottom, #D0D0D0, #B0B0B0);
  font-size: 10px; font-family: inherit; cursor: pointer; color: #4A4A4A;
}
.sv-seg-btn:first-child { border-radius: 3px 0 0 3px; }
.sv-seg-btn:last-child { border-radius: 0 3px 3px 0; border-right: 1px solid #8A8A8A; }
.sv-seg-btn.active {
  background: linear-gradient(to bottom, #4A8BDA, #2565C1);
  color: #fff; border-color: #1C52A5;
}
.sv-section-header {
  font-size: 10px; font-weight: 700; color: #6A7A8A;
  text-transform: uppercase; padding: 8px 8px 4px 8px;
  text-shadow: 0 1px 0 rgba(255,255,255,0.5);
}

/* ── Status Bar ── */
#statusbar {
  height: 22px; min-height: 22px;
  background: linear-gradient(to bottom, #D0D0D0, #B8B8B8);
  border-top: 1px solid #A0A0A0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: #4A4A4A;
  text-shadow: 0 1px 0 rgba(255,255,255,0.5);
  padding: 0 12px;
  user-select: none;
}
#statusbar-text { text-align: center; }

/* ── Scrollbars (WebKit) ── */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: #E8ECF0; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(to right, #9ABADE, #7BAAD6, #5A96CC);
  border-radius: 5px; border: 1px solid #4A86BC;
}
::-webkit-scrollbar-thumb:hover { background: linear-gradient(to right, #8AAACE, #6B9AC6, #4A86BC); }

/* ── Mobile Browser Tabs ── */
#mob-browser-tabs {
  display: none;
  border-bottom: 1px solid #B0B0B0;
  background: linear-gradient(to bottom, #F5F5F5, #E0E0E0);
  padding: 4px 6px; gap: 0;
}
.mob-tab {
  padding: 2px 10px; border: 1px solid #8A8A8A; border-right: none;
  background: linear-gradient(to bottom, #D0D0D0, #B0B0B0);
  font-size: 10px; font-family: inherit; cursor: pointer; color: #4A4A4A;
}
.mob-tab:first-child { border-radius: 3px 0 0 3px; }
.mob-tab:last-child { border-radius: 0 3px 3px 0; border-right: 1px solid #8A8A8A; }
.mob-tab.active {
  background: linear-gradient(to bottom, #4A8BDA, #2565C1);
  color: #fff; border-color: #1C52A5;
}

/* ── Mobile Now Playing Bar ── */
#mobile-now-playing {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 72px; z-index: 90;
  background: linear-gradient(to bottom, #D0D0D0, #A8A8A8);
  border-top: 1px solid #A0A0A0;
  align-items: center; gap: 8px;
  padding: 0 8px;
  cursor: pointer;
  transform: translateY(100%);
  transition: transform 0.25s ease;
}
#mobile-now-playing.visible { transform: translateY(0); }
#mnp-art { width: 40px; height: 40px; border-radius: 3px; flex-shrink: 0; background: #C0C8D0; }
#mnp-art img { width: 100%; height: 100%; object-fit: cover; border-radius: 3px; }
#mnp-info { flex: 1; min-width: 0; }
#mnp-title { font-size: 11px; font-weight: bold; color: #1A1A1A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#mnp-sub { font-size: 10px; color: #5A5A5A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#mnp-detail { font-size: 9px; color: #7A7A7A; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#mnp-controls { display: flex; gap: 4px; flex-shrink: 0; }
#mnp-controls button {
  background: none; border: none; font-size: 16px; color: #4A4A4A;
  cursor: pointer; padding: 4px 6px; line-height: 1;
}

/* ── Mobile ── */
@media (max-width: 768px) {
  /* Larger text for mobile */
  body { font-size: 14px; }
  #toolbar { height: 56px; min-height: 56px; padding: 0 8px; gap: 8px; }
  #hamburger { display: block; font-size: 22px; }
  .traffic-lights { display: none; }
  .controls-tray { display: none; }
  .view-seg { display: none; }
  #lcd { flex: 1; min-width: 0; height: 32px; }
  #lcd-title { font-size: 13px; }
  #lcd-subtitle { font-size: 11px; }
  /* Search: hidden by default, toggle via button */
  #search-wrap { display: none; }
  #search-wrap.mob-open {
    display: flex; align-items: center;
    position: absolute; left: 0; right: 0; top: 56px;
    z-index: 10; background: linear-gradient(to bottom, #D0D0D0, #C0C0C0);
    padding: 6px 10px; border-bottom: 1px solid #A0A0A0;
    gap: 0;
  }
  #search-wrap.mob-open #search-icon {
    position: static; flex-shrink: 0; font-size: 16px; margin-right: -26px; z-index: 1; padding-left: 8px;
  }
  #search-wrap.mob-open #search {
    flex: 1; height: 34px; font-size: 14px; border-radius: 17px;
    padding: 0 34px 0 30px;
  }
  #search-wrap.mob-open #search-clear {
    position: static; flex-shrink: 0; font-size: 18px; margin-left: -30px; z-index: 1;
    line-height: 34px;
  }
  #mob-search-btn { display: block !important; }
  /* Sidebar */
  #sidebar {
    position: fixed; left: -240px; top: 0; bottom: 0;

window.onSpotifyWebPlaybackSDKReady = () => { window._spotifySDKLoaded = true; };
</script>
<script src="https://sdk.scdn.co/spotify-player.js"></script>
<script>
// Fallback: if SDK loaded but didn't call callback
setTimeout(() => {
  if (!window._spotifySDKLoaded && window.Spotify && window.Spotify.Player) {
    console.log('[Spotify SDK] Detected Spotify global without callback — forcing flag');
    window._spotifySDKLoaded = true;
  } else if (!window._spotifySDKLoaded) {
    console.warn('[Spotify SDK] SDK not available after 3s. Spotify global:', !!window.Spotify, 'Player:', !!(window.Spotify && window.Spotify.Player));
  }
}, 3000);

// ── State ──
const S = {
  view: 'all',
  tracks: [],
  filtered: [],
  sort: { col: null, asc: true },
  selectedIdx: -1,
  sidebar: null,
  browserFilter: { genre: '', artist: '', album: '' },
  searchQ: '',
};

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const api = p => fetch(p).then(r => r.json());

// ── Player Engine ──
const Player = {
  mode: null,          // 'navidrome' | 'spotify' | null
  currentTrack: null,
  currentIdx: -1,
  playing: false,
  audio: null,
  spotifyPlayer: null,
  spotifyReady: false,
  deviceId: null,
  _spTokenCache: null,
  _spTokenExp: 0,
  _spInstance: null,
  _spConnecting: null,
  // Queue system
  queue: [],
  queueIdx: -1,
  queueView: null,
  queueBrowserFilter: {},
  queueSearchQ: '',
  queueSort: {},
  repeat: 'off',      // 'off' | 'all' | 'one'
  shuffle: false,
  _originalQueue: [],
};

const _isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

// ── iTunes 7-style SVG Icons ──
const ICONS = {
  prev: '<svg viewBox="0 0 14 14" fill="currentColor"><rect x="1" y="3" width="2" height="8" rx="0.5"/><polygon points="12,3 5,7 12,11"/><polygon points="8,3 1,7 8,11" opacity="0" /></svg>',
  play: '<svg viewBox="0 0 14 14" fill="currentColor"><polygon points="3,1.5 12.5,7 3,12.5"/></svg>',
  pause: '<svg viewBox="0 0 14 14" fill="currentColor"><rect x="2.5" y="2" width="3" height="10" rx="0.8"/><rect x="8.5" y="2" width="3" height="10" rx="0.8"/></svg>',
  next: '<svg viewBox="0 0 14 14" fill="currentColor"><polygon points="2,3 9,7 2,11"/><rect x="11" y="3" width="2" height="8" rx="0.5"/></svg>',
  shuffle: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 10h2l3-3 3 3h2"/><path d="M1 4h2l3 3"/><path d="M9 4h2"/><polyline points="10,2 12,4 10,6"/><polyline points="10,8 12,10 10,12"/></svg>',
  repeat: '<svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 8.5V6a2 2 0 0 1 2-2h7"/><polyline points="9,2 11,4 9,6"/><path d="M12.5 5.5V8a2 2 0 0 1-2 2h-7"/><polyline points="5,12 3,10 5,8"/></svg>',
  repeatOne: '<svg viewBox="0 0 14 14" fill="currentColor" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M1.5 8.5V6a2 2 0 0 1 2-2h7" fill="none"/><polyline points="9,2 11,4 9,6" fill="none"/><path d="M12.5 5.5V8a2 2 0 0 1-2 2h-7" fill="none"/><polyline points="5,12 3,10 5,8" fill="none"/><text x="7" y="9" text-anchor="middle" font-size="6" font-weight="bold" stroke="none" fill="currentColor">1</text></svg>',
};

async function _getSpotifyToken() {
  if (Player._spTokenCache && Date.now() < Player._spTokenExp) return Player._spTokenCache;
  try {
    const d = await api('/api/spotify-token');
    if (d.access_token) {
      Player._spTokenCache = d.access_token;
      Player._spTokenExp = Date.now() + 50 * 60 * 1000;
      return d.access_token;
    }
  } catch(e) {}
  return null;
}

function _trackLink(t) {
  if (!t || !t.uri) return null;
  const parts = t.uri.split(':');
  if (parts.length === 3) return 'https://open.spotify.com/' + parts[1] + '/' + parts[2];
  return null;
}

// Connect Spotify Web Playback SDK (desktop only)
async function _ensureSpotifyConnected() {
  if (Player.spotifyReady && Player.deviceId) return true;
  if (Player._spConnecting) return Player._spConnecting;
  if (!window._spotifySDKLoaded || !window.Spotify || !window.Spotify.Player) return false;

  Player._spConnecting = new Promise(async (resolve) => {
    const token = await _getSpotifyToken();
    if (!token) { Player._spConnecting = null; resolve(false); return; }

    const p = new Spotify.Player({
      name: 'VibeShelf',
      getOAuthToken: async cb => { cb(await _getSpotifyToken()); },
      volume: 0.8,
    });
    Player._spInstance = p;

    const timeout = setTimeout(() => {
      Player._spConnecting = null; resolve(false);
    }, 15000);

    p.addListener('ready', ({device_id}) => {
      clearTimeout(timeout);
      Player.deviceId = device_id;
      Player.spotifyReady = true;
      Player.spotifyPlayer = p;
      Player._spConnecting = null;
      resolve(true);
    });

    p.addListener('not_ready', () => { Player.spotifyReady = false; });
    p.addListener('initialization_error', () => { clearTimeout(timeout); Player._spConnecting = null; resolve(false); });
    p.addListener('authentication_error', () => { clearTimeout(timeout); Player.spotifyReady = false; Player._spConnecting = null; resolve(false); });

    p.addListener('player_state_changed', state => {
      if (!state) return;
      Player.playing = !state.paused;
      _updatePlayBtn();
      if (state.paused && state.position === 0 && state.track_window?.previous_tracks?.length > 0) {
        _autoNext();
      }
    });

    await p.connect();
  });

  return Player._spConnecting;
}

function _trackPlatform(t) {
  if (!t) return null;
  if (t.uri && t.uri.startsWith('navidrome:')) return 'navidrome';
  if (t.uri && t.uri.startsWith('spotify:')) return 'spotify';
  return null;
}

async function playTrack(track, idx, fromQueue) {
  if (!track) return;
  // Stop current playback
  if (Player.mode === 'navidrome' && Player.audio) { Player.audio.pause(); }
  if (Player.mode === 'spotify' && Player.spotifyPlayer) {
    try { await Player.spotifyPlayer.pause(); } catch(e) {}
  }

  // Snapshot queue on user-initiated play (not from autoNext/ctrlNext)
  if (!fromQueue) {
    Player.queue = [...S.filtered];
    Player.queueIdx = idx;
    Player.queueView = S.view;
    Player.queueBrowserFilter = { ...S.browserFilter };
    Player.queueSearchQ = S.searchQ;
    Player.queueSort = { ...S.sort };
    if (Player.shuffle) {
      Player._originalQueue = [...Player.queue];
      _shuffleRemaining();
    }
  }

  Player.currentTrack = track;
  Player.currentIdx = idx;
  if (!fromQueue) S.selectedIdx = idx;

  if (!fromQueue) selectRow(idx);
  _markNowPlaying();

  // Always update LCD and mobile now-playing with current track
  updateLCD(track);
  updateArt(track);
  updateMediaSession(track);
  updateMobileNowPlaying(track);

  const plat = _trackPlatform(track);

  if (!plat) {
    console.warn('No playable URI for track', track);
    $('#lcd-title').textContent = 'Not playable';
    return;
  }

  if (plat === 'navidrome') {
    Player.mode = 'navidrome';
    const songId = track.uri.split(':')[1];
    Player.audio.src = '/api/stream?id=' + encodeURIComponent(songId);
    try {
      await Player.audio.play();
      Player.playing = true;
      fetch('/api/scrobble?id=' + encodeURIComponent(songId));
    } catch(e) {
      Player.playing = false;
    }
    _updatePlayBtn();
  } else if (plat === 'spotify') {
    if (_isMobile) {
      // Mobile: open in Spotify app
      const link = _trackLink(track);
      if (link) window.open(link, '_blank');
    } else {
      // Desktop: stream via Web Playback SDK
      const sdkOk = await _ensureSpotifyConnected();
      if (sdkOk && Player.deviceId) {
        Player.mode = 'spotify';
        const token = await _getSpotifyToken();
        if (token) {
          try {
            const resp = await fetch('https://api.spotify.com/v1/me/player/play?device_id=' + Player.deviceId, {
              method: 'PUT',
              headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
              body: JSON.stringify({ uris: [track.uri] }),
            });
            if (!resp.ok) {
              const body = await resp.text();
              console.error('Spotify play failed', resp.status, body, 'uri=', track.uri);
              $('#lcd-title').textContent = 'Playback failed (' + resp.status + ')';
            } else {
              Player.playing = true;
              _updatePlayBtn();
            }
          } catch(e) {
            console.error('Spotify play exception', e, 'uri=', track.uri);
            $('#lcd-title').textContent = 'Playback failed';
          }
        }
      } else {
        // SDK unavailable on desktop — fallback to Spotify web
        const link = _trackLink(track);
        if (link) window.open(link, '_blank');
      }
    }
  }
}

function _autoNext() {
  const q = Player.queue;
  const len = q.length;
  if (!len) return;

  if (Player.repeat === 'one') {
    playTrack(q[Player.queueIdx], Player.queueIdx, true);
    return;
  }

  const next = Player.queueIdx + 1;
  if (next < len) {
    Player.queueIdx = next;
    playTrack(q[next], next, true);
  } else if (Player.repeat === 'all') {
    Player.queueIdx = 0;
    playTrack(q[0], 0, true);
  } else {
    Player.playing = false;
    _updatePlayBtn();
  }
}

function _updatePlayBtn() {
  if ('mediaSession' in navigator) {
    try { navigator.mediaSession.playbackState = Player.playing ? 'playing' : 'paused'; } catch(e) {}
  }
  const btn = $('#ctrl-play');
  const mnpBtn = $('#mnp-play');
  if (Player.playing) {
    btn.innerHTML = ICONS.pause;
    btn.classList.add('is-playing');
    if (mnpBtn) mnpBtn.innerHTML = ICONS.pause;
  } else {
    btn.innerHTML = ICONS.play;
    btn.classList.remove('is-playing');
    if (mnpBtn) mnpBtn.innerHTML = ICONS.play;
  }
}

function ctrlRepeat() {
  const modes = ['off', 'all', 'one'];
  const cur = modes.indexOf(Player.repeat);
  Player.repeat = modes[(cur + 1) % 3];
  _updateRepeatBtn();
}
function _updateRepeatBtn() {
  const btn = $('#ctrl-repeat');
  if (!btn) return;
  if (Player.repeat === 'off') {
    btn.innerHTML = ICONS.repeat;
    btn.title = 'Repeat: Off';
    btn.classList.remove('repeat-active');
    btn.style.opacity = '0.5';
  } else if (Player.repeat === 'all') {
    btn.innerHTML = ICONS.repeat;
    btn.title = 'Repeat: All';
    btn.classList.add('repeat-active');
    btn.style.opacity = '';
  } else {
    btn.innerHTML = ICONS.repeatOne;
    btn.title = 'Repeat: One';
    btn.classList.add('repeat-active');
    btn.style.opacity = '';
  }
}

// ── Shuffle ──
function ctrlShuffle() {
  Player.shuffle = !Player.shuffle;
  if (Player.shuffle && Player.queue.length > 0) {
    Player._originalQueue = [...Player.queue];
    _shuffleRemaining();
  } else if (!Player.shuffle && Player._originalQueue.length > 0) {
    const cur = Player.queue[Player.queueIdx];
    Player.queue = [...Player._originalQueue];
    if (cur) {
      const newIdx = Player.queue.findIndex(t => t.id === cur.id);
      if (newIdx >= 0) Player.queueIdx = newIdx;
    }
    Player._originalQueue = [];
  }
  _updateShuffleBtn();
}

function _shuffleRemaining() {
  const start = Player.queueIdx + 1;
  const q = Player.queue;
  for (let i = q.length - 1; i > start; i--) {
    const j = start + Math.floor(Math.random() * (i - start + 1));
    [q[i], q[j]] = [q[j], q[i]];
  }
}

function _updateShuffleBtn() {
  const btn = $('#ctrl-shuffle');
  if (!btn) return;
  if (Player.shuffle) {
    btn.classList.add('shuffle-active');
    btn.style.opacity = '';
    btn.title = 'Shuffle: On';
  } else {
    btn.classList.remove('shuffle-active');
    btn.style.opacity = '0.5';
    btn.title = 'Shuffle: Off';
  }
}

function _initControlIcons() {
  const s = id => $(id);
  s('#ctrl-prev').innerHTML = ICONS.prev;
  s('#ctrl-play').innerHTML = ICONS.play;
  s('#ctrl-next').innerHTML = ICONS.next;
  s('#ctrl-shuffle').innerHTML = ICONS.shuffle;
  s('#ctrl-repeat').innerHTML = ICONS.repeat;
  // Mobile
  const mp = s('#mnp-prev'); if (mp) mp.innerHTML = ICONS.prev;
  const mpl = s('#mnp-play'); if (mpl) mpl.innerHTML = ICONS.play;
  const mn = s('#mnp-next'); if (mn) mn.innerHTML = ICONS.next;
}

function _isQueueView() {
  return Player.queueView != null && S.view === Player.queueView
    && JSON.stringify(S.browserFilter) === JSON.stringify(Player.queueBrowserFilter)
    && S.searchQ === Player.queueSearchQ;
}

function _markNowPlaying() {
  $$('#track-body tr.now-playing').forEach(tr => tr.classList.remove('now-playing'));
  if (!Player.currentTrack || !_isQueueView()) return;
  // Mark only the exact playing row by index — listening history can contain
  // many duplicates of the same uri, so matching by uri alone bolds them all.
  const playIdx = Player.currentIdx;
  if (playIdx == null || playIdx < 0) return;
  $$('#track-body tr[data-idx]').forEach(tr => {
    if (parseInt(tr.dataset.idx) === playIdx) tr.classList.add('now-playing');
  });
}

function _initAudioEvents() {
  const a = Player.audio;
  a.addEventListener('timeupdate', () => {
    if (Player.mode !== 'navidrome') return;
    const dur = (a.duration && isFinite(a.duration)) ? a.duration : 0;
    const trackDur = dur > 0 ? dur : (Player.currentTrack?.duration_ms ? Player.currentTrack.duration_ms / 1000 : 0);
    if (trackDur > 0) {
      const pct = (a.currentTime / trackDur) * 100;
      $('#lcd-bar-fill').style.width = Math.min(pct, 100) + '%';
    }
    if (Player.currentTrack) {
      const cur = fmtDur(a.currentTime * 1000);
      const tot = trackDur > 0 ? fmtDur(trackDur * 1000) : fmtDur(Player.currentTrack.duration_ms || 0);
      $('#lcd-subtitle').textContent = cur + ' / ' + tot + ' \u2014 ' + normArtist(Player.currentTrack.artist);
    }
    if (trackDur > 0 && 'mediaSession' in navigator && navigator.mediaSession.setPositionState) {
      try {
        navigator.mediaSession.setPositionState({
          duration: trackDur,
          position: Math.min(a.currentTime, trackDur),
          playbackRate: a.playbackRate || 1,
        });
      } catch(e) {}
    }
  });
  a.addEventListener('ended', _autoNext);
  a.addEventListener('error', () => {
    setTimeout(_autoNext, 1500);
  });
  a.addEventListener('play', () => { Player.playing = true; _updatePlayBtn(); });
  a.addEventListener('pause', () => { Player.playing = false; _updatePlayBtn(); });

  // LCD bar click to seek
  $('#lcd-bar').addEventListener('click', e => {
    if (Player.mode !== 'navidrome') return;
    const dur = (Player.audio.duration && isFinite(Player.audio.duration)) ? Player.audio.duration : 0;
    const trackDur = dur > 0 ? dur : (Player.currentTrack?.duration_ms ? Player.currentTrack.duration_ms / 1000 : 0);
    if (trackDur > 0) {
      const rect = e.currentTarget.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      Player.audio.currentTime = pct * trackDur;
    }
  });
}

// Navigate back to the queue's original view and scroll to playing track
async function _navToQueueView() {
  if (!Player.currentTrack || !Player.queueView) return;
  const target = document.querySelector('.sb-item[data-source="' + Player.queueView + '"]');
  if (!target) return;

  $$('.sb-item').forEach(i => i.classList.remove('active'));
  target.classList.add('active');
  S.view = Player.queueView;
  S.browserFilter = { ...Player.queueBrowserFilter };
  S.searchQ = Player.queueSearchQ;
  S.sort = { ...Player.queueSort };
  $('#search').value = S.searchQ;
  $('#search-clear').style.display = S.searchQ ? 'block' : 'none';

  populateBrowser();
  for (const key of ['genre', 'artist', 'album']) {
    if (S.browserFilter[key]) {
      $$('#br-' + key + ' .browser-item').forEach(i => {
        i.classList.toggle('active', i.dataset.val === S.browserFilter[key]);
      });
    }
  }

  await loadView();
  const uri = Player.currentTrack.uri;
  const idx = S.filtered.findIndex(t => t.uri === uri);
  if (idx >= 0) { S.selectedIdx = idx; selectRow(idx); scrollToSelected(); }
  $('#sidebar').classList.remove('open');
  $('#sidebar-overlay').classList.remove('active');
}

// LCD click: navigate back to queue view
$('#lcd').addEventListener('click', (e) => {
  if (e.target.id === 'lcd-bar' || e.target.id === 'lcd-bar-fill') return;
  _navToQueueView();
});

// Spotify state polling for progress bar
setInterval(async () => {
  if (Player.mode !== 'spotify' || !Player.spotifyPlayer || !Player.playing) return;
  try {
    const state = await Player.spotifyPlayer.getCurrentState();
    if (state && state.duration && isFinite(state.duration)) {
      const pct = (state.position / state.duration) * 100;
      $('#lcd-bar-fill').style.width = Math.min(pct, 100) + '%';
      if (Player.currentTrack) {
        const cur = fmtDur(state.position);
        const tot = fmtDur(state.duration);
        $('#lcd-subtitle').textContent = cur + ' / ' + tot + ' \u2014 ' + normArtist(Player.currentTrack.artist);
      }
    }
  } catch(e) {}
}, 1000);

// ── Helpers ──
function fmtDur(ms) {
  if (!ms) return '';
  const m = Math.floor(ms/60000), s = Math.floor((ms%60000)/1000);
  return m + ':' + String(s).padStart(2,'0');
}
function fmtDurTotal(ms) {
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
  if (h > 24) return (h/24).toFixed(1) + ' days';
  if (h > 0) return h + ' hr ' + m + ' min';
  return m + ' min';
}
const ND_EXT_URL = '__ND_EXT_URL__';
function spLink(uri) {
  if (!uri) return '#';
  const p = uri.split(':');
  return 'https://open.spotify.com/' + p[1] + '/' + p[2];
}
function trackLink(t) {
  if (!t || !t.uri) return '#';
  if (t.platform === 'navidrome' && t.album_id) return ND_EXT_URL + '/app/#/album/' + t.album_id + '/show';
  if (t.platform === 'navidrome') return '#';
  const p = t.uri.split(':');
  return 'https://open.spotify.com/' + p[1] + '/' + p[2];
}
const SPOTIFY_ICON = '<svg viewBox="0 0 24 24" width="12" height="12"><circle cx="12" cy="12" r="11" fill="#1DB954"/><g fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"><path d="M7 9.5c3.5-1 7-0.5 10 1"/><path d="M7.5 12.5c2.8-0.8 5.5-0.3 8 0.8"/><path d="M8 15.3c2-0.5 4-0.2 6 0.6"/></g></svg>';
const NAVIDROME_ICON = '<svg viewBox="0 0 24 24" width="12" height="12"><circle cx="12" cy="12" r="11" fill="#0EA5E9"/><path d="M9 7v10l8-5z" fill="#fff"/></svg>';
function srcIcon(t) {
  if (t.platform === 'both') return SPOTIFY_ICON + NAVIDROME_ICON;
  return (t.platform === 'navidrome') ? NAVIDROME_ICON : SPOTIFY_ICON;
}
function escHtml(s) {
  return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : '';
}
function normArtist(s) { return s ? s.replace(/ \u2022 /g, ', ') : s; }
function artUrl(url) {
  if (!url) return '';
  if (url.startsWith('nd:') || url.startsWith('https://i.scdn.co/')) return '/api/art?url=' + encodeURIComponent(url);
  return url;
}

// ── Sidebar ──
async function initSidebar() {
  S.sidebar = await api('/api/sidebar');
  const intg = S.sidebar.integrations || {};
  const show = sel => { const el = $(sel); if (el) el.style.display = ''; };

  // Show sidebar items based on configured integrations
  if (intg.spotify || intg.navidrome) show('#sb-all');
  if (intg.spotify) {
    show('#sb-saved'); show('#sb-top-tracks'); show('#sb-top-artists');
    show('#sb-podcasts'); show('#sb-status'); show('#sb-playlists-section');
  }
  if (intg.koito || intg.spotify) show('#sb-recent');
  // Navidrome: show if count > 0 (may have tracks even without live connection)
  const ndCount = S.sidebar.navidrome_count || 0;
  if (ndCount > 0) show('#sb-navidrome');

  // Populate counts
  $('#sb-music-count').textContent = S.sidebar.saved_count || '';
  $('#sb-recent-count').textContent = S.sidebar.recent_count || '';
  $('#sb-navidrome-count').textContent = ndCount || '';
  $('#sb-all-count').textContent = S.sidebar.all_count || ((S.sidebar.saved_count || 0) + ndCount);

  // Set default active view to first visible item
  const firstVisible = [...document.querySelectorAll('#sidebar-list .sb-item')].find(el => el.style.display !== 'none');
  if (firstVisible) {
    firstVisible.classList.add('active');
    S.view = firstVisible.dataset.source;
  }

  // Playlists
  const plC = $('#sb-playlists');
  plC.innerHTML = S.sidebar.playlists.map(p =>
    '<div class="sb-item" data-source="playlist:' + escHtml(p.id) + '" onclick="navTo(this)">' +
    '<span class="sb-icon" style="color:#4A8BDA">&#9834;</span>' +
    '<span class="sb-label">' + escHtml(p.name) + '</span>' +
    '<span class="sb-count">' + (p.count||'') + '</span></div>'
  ).join('');
  // LCD
  $('#lcd-title').textContent = '\u266B VibeShelf';
  $('#lcd-subtitle').textContent = S.sidebar.user + ' \u2014 ' + (S.sidebar.all_count || (S.sidebar.saved_count||0)) + ' songs';
  // Browser
  populateBrowser();
}

function populateBrowser() {
  if (!S.sidebar) return;
  const gf = S.browserFilter;
  let genres, artists, albums;
  if (S.view === 'all') {
    genres = S.sidebar.genres || [];
    artists = S.sidebar.artists || [];
    albums = S.sidebar.albums || [];
  } else {
    const genreSet = new Set(), artistSet = new Set(), albumSet = new Set();
    for (const t of S.tracks) {
      if (t.genre) genreSet.add(t.genre);
      if (t.artist) artistSet.add(normArtist(t.artist));
      if (t.album) albumSet.add(t.album);
    }
    genres = [...genreSet].sort((a, b) => a.localeCompare(b, undefined, {sensitivity: 'base'}));
    artists = [...artistSet].sort((a, b) => a.localeCompare(b, undefined, {sensitivity: 'base'}));
    albums = [...albumSet].sort((a, b) => a.localeCompare(b, undefined, {sensitivity: 'base'}));
  }

  // Filter browser lists by search query
  if (S.searchQ) {
    const q = S.searchQ.toLowerCase();
    genres = genres.filter(g => g.toLowerCase().includes(q));
    artists = artists.filter(a => a.toLowerCase().includes(q));
    albums = albums.filter(a => a.toLowerCase().includes(q));
  }

  renderBrowserCol('br-genre', genres, gf.genre, 'genre');
  renderBrowserCol('br-artist', artists, gf.artist, 'artist');
  renderBrowserCol('br-album', albums, gf.album, 'album');
}

function renderBrowserCol(id, items, active, key) {
  const el = $('#' + id);
  const allCount = items.length;
  let html = '<div class="browser-item all-item' + (!active ? ' active' : '') + '" data-key="' + key + '" data-val="" onclick="browserSelect(this)">All (' + allCount + ')</div>';
  for (const item of items) {
    const isActive = active && active === item;
    html += '<div class="browser-item' + (isActive ? ' active' : '') + '" data-key="' + key + '" data-val="' + escHtml(item) + '" onclick="browserSelect(this)">' + escHtml(item) + '</div>';
  }
  el.innerHTML = html;
}

function browserSelect(el) {
  const key = el.dataset.key;
  const val = el.dataset.val;
  // Only 1 filter active at a time: reset others when selecting a value
  if (val) {
    const keys = ['genre', 'artist', 'album'];
    for (const k of keys) {
      if (k !== key) {
        S.browserFilter[k] = '';
        // Reset visual state in that column
        const col = $('#br-' + k);
        if (col) col.querySelectorAll('.browser-item').forEach(i => {
          i.classList.toggle('active', i.dataset.val === '');
        });
      }
    }
  }
  S.browserFilter[key] = val;
  // Update active state in this column
  el.parentElement.querySelectorAll('.browser-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  applyFiltersAndRender();
}

// ── Navigation ──
function navTo(el) {
  $$('.sb-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  S.view = el.dataset.source;
  S.selectedIdx = -1;
  S.browserFilter = { genre: '', artist: '', album: '' };
  populateBrowser();
  loadView();
  // Close mobile sidebar
  $('#sidebar').classList.remove('open');
  $('#sidebar-overlay').classList.remove('active');
}

async function loadView() {
  const v = S.view;
  const tableWrap = $('#table-wrap');
  const sv = $('#special-view');
  const browser = $('#browser');
  const mobTabs = $('#mob-browser-tabs');
  // Keep mobile now-playing visible if something is playing
  if (!Player.playing) updateMobileNowPlaying(null);

  // Track-based views show table
  if (v === 'saved' || v === 'all' || v === 'navidrome' || v === 'recent' || v.startsWith('top_short') || v.startsWith('top_medium') || v.startsWith('top_long') || v.startsWith('playlist:')) {
    tableWrap.style.display = ''; sv.style.display = 'none'; sv.classList.remove('active');
    const hideBrowser = v === 'recent' || v.startsWith('top_') || v.startsWith('playlist:');
    if (hideBrowser) browser.classList.add('hidden');
    else browser.classList.remove('hidden');
    mobTabs.style.display = hideBrowser ? 'none' : '';
    const d = await api('/api/library?source=' + encodeURIComponent(v));
    S.tracks = d.tracks || [];
    S.sort = { col: null, asc: true };
    applyFiltersAndRender();
    updateLCD(null);
  } else if (v === 'top_artists') {
    tableWrap.style.display = 'none'; browser.classList.add('hidden'); mobTabs.style.display = 'none';
    sv.style.display = 'block'; sv.classList.add('active');
    await loadTopArtistsView();
  } else if (v === 'podcasts') {
    tableWrap.style.display = 'none'; browser.classList.add('hidden'); mobTabs.style.display = 'none';
    sv.style.display = 'block'; sv.classList.add('active');
    await loadPodcastsView();
  } else if (v === 'status') {
    tableWrap.style.display = 'none'; browser.classList.add('hidden'); mobTabs.style.display = 'none';
    sv.style.display = 'block'; sv.classList.add('active');
    await loadStatusView();
  }
}

// ── Filtering & Rendering ──
function applyFiltersAndRender() {
  let tracks = S.tracks;
  const bf = S.browserFilter;
  if (bf.genre) tracks = tracks.filter(t => t.genre.toLowerCase() === bf.genre.toLowerCase());
  if (bf.artist) tracks = tracks.filter(t => normArtist(t.artist).toLowerCase().includes(bf.artist.toLowerCase()));
  if (bf.album) tracks = tracks.filter(t => t.album.toLowerCase() === bf.album.toLowerCase());
  if (S.searchQ) {
    const q = S.searchQ.toLowerCase();
    tracks = tracks.filter(t => t.name.toLowerCase().includes(q) || normArtist(t.artist).toLowerCase().includes(q) || t.album.toLowerCase().includes(q));
  }
  // Sort
  if (S.sort.col) {
    const col = S.sort.col;
    const asc = S.sort.asc;
    tracks = [...tracks].sort((a, b) => {
      let va = col === 'index' ? 0 : (a[col] || '');
      let vb = col === 'index' ? 0 : (b[col] || '');
      if (col === 'duration_ms' || col === 'year') { va = Number(va)||0; vb = Number(vb)||0; }
      else { va = String(va).toLowerCase(); vb = String(vb).toLowerCase(); }
      if (va < vb) return asc ? -1 : 1;
      if (va > vb) return asc ? 1 : -1;
      return 0;
    });
  }
  S.filtered = tracks;
  renderTable();
}

const ROW_H = 18;
const VBUFFER = 10;
const isMobile = () => window.innerWidth <= 768;

function updateMobileNumWidth() {
  if (!isMobile()) return;
  const digits = String(S.filtered.length).length;
  const w = (digits * 8 + 12);
  const th = document.querySelector('#track-table .col-num');
  if (th) th.style.setProperty('width', w + 'px', 'important');
}

function renderTable() {
  const tbody = $('#track-body');
  tbody.innerHTML = '';
  updateMobileNumWidth();
  const colSpan = isMobile() ? 3 : 8;
  const topSp = document.createElement('tr');
  topSp.id = 'vs-top';
  topSp.innerHTML = '<td colspan="' + colSpan + '" style="padding:0;border:none;height:0"></td>';
  const botSp = document.createElement('tr');
  botSp.id = 'vs-bot';
  botSp.innerHTML = '<td colspan="' + colSpan + '" style="padding:0;border:none;height:0"></td>';
  tbody.appendChild(topSp);
  tbody.appendChild(botSp);
  S._vsStart = -1; S._vsEnd = -1;
  renderVisibleRows();
  updateStatusBar();
  updateSortArrows();
}

function renderVisibleRows() {
  const wrap = $('#table-wrap');
  const tbody = $('#track-body');
  const total = S.filtered.length;
  const topSp = $('#vs-top'), botSp = $('#vs-bot');
  if (!topSp || !botSp) return;
  if (!total) {
    topSp.firstChild.style.height = '0';
    botSp.firstChild.style.height = '0';
    while (topSp.nextSibling && topSp.nextSibling !== botSp) tbody.removeChild(topSp.nextSibling);
    return;
  }
  const rh = window.innerWidth <= 768 ? 24 : ROW_H;
  const scrollTop = wrap.scrollTop;
  const viewH = wrap.clientHeight;
  const start = Math.max(0, Math.floor(scrollTop / rh) - VBUFFER);
  const end = Math.min(total, Math.ceil((scrollTop + viewH) / rh) + VBUFFER);
  if (start === S._vsStart && end === S._vsEnd) return;
  S._vsStart = start; S._vsEnd = end;
  topSp.firstChild.style.height = (start * rh) + 'px';
  botSp.firstChild.style.height = ((total - end) * rh) + 'px';
  while (topSp.nextSibling && topSp.nextSibling !== botSp) tbody.removeChild(topSp.nextSibling);
  const frag = document.createDocumentFragment();
  for (let i = start; i < end; i++) {
    const t = S.filtered[i];
    const tr = document.createElement('tr');
    const isNowPlaying = _isQueueView() && Player.currentTrack && i === Player.currentIdx;
    tr.className = (i % 2 === 0 ? 'row-even' : 'row-odd') + (i === S.selectedIdx ? ' selected' : '') + (isNowPlaying ? ' now-playing' : '');
    tr.dataset.idx = i;
    tr.onclick = function() { selectRow(parseInt(this.dataset.idx)); };
    tr.ondblclick = function() { const idx = parseInt(this.dataset.idx); const tk = S.filtered[idx]; if (tk) playTrack(tk, idx); };
    if (isMobile()) {
      tr.innerHTML =
        '<td class="col-num">' + (i+1) + '</td>' +
        '<td class="col-name">' + escHtml(t.name) + '</td>' +
        '<td class="col-artist">' + escHtml(normArtist(t.artist)) + '</td>';
    } else {
      tr.innerHTML =
        '<td class="col-src">' + srcIcon(t) + '</td>' +
        '<td class="col-num">' + (i+1) + '</td>' +
        '<td class="col-name">' + escHtml(t.name) + '</td>' +
        '<td class="col-time">' + fmtDur(t.duration_ms) + '</td>' +
        '<td class="col-artist">' + escHtml(normArtist(t.artist)) + '</td>' +
        '<td class="col-album">' + escHtml(t.album) + '</td>' +
        '<td class="col-genre">' + escHtml(t.genre) + '</td>' +
        '<td class="col-year">' + escHtml(t.year) + '</td>';
    }
    frag.appendChild(tr);
  }
  tbody.insertBefore(frag, botSp);
}

$('#table-wrap').addEventListener('scroll', () => requestAnimationFrame(() => { renderVisibleRows(); _markNowPlaying(); }));

function selectRow(idx) {
  S.selectedIdx = idx;
  $$('#track-body tr[data-idx]').forEach(tr => {
    tr.classList.toggle('selected', parseInt(tr.dataset.idx) === idx);
  });
  const t = S.filtered[idx];
  if (t) {
    updateLCD(t);
    updateArt(t);
    updateMobileNowPlaying(t);
  }
}

function updateLCD(t) {
  // If player is active, show the playing track in LCD (timeupdate handles subtitle)
  const show = (Player.playing && Player.currentTrack) ? Player.currentTrack : t;
  if (show) {
    $('#lcd-title').textContent = show.name;
    if (!Player.playing) {
      $('#lcd-subtitle').textContent = normArtist(show.artist) + ' \u2014 ' + show.album;
    }
  } else {
    const label = S.view === 'all' ? 'All Music' : S.view === 'saved' ? 'Spotify' : S.view === 'recent' ? 'Listening History' :
      S.view.startsWith('top_') ? 'Top Tracks' : S.view.startsWith('playlist:') ? (S.filtered[0]?.source_name || 'Playlist') : 'VibeShelf';
    $('#lcd-title').textContent = label;
    $('#lcd-subtitle').textContent = S.filtered.length + ' songs';
  }
}

function updateArt(t) {
  const el = $('#sidebar-art');
  if (t && t.image) {
    el.innerHTML = '<img src="' + escHtml(artUrl(t.image)) + '" loading="lazy">';
  } else {
    el.innerHTML = '<div class="placeholder">&#9835;</div>';
  }
}

function updateMediaSession(t) {
  if (!('mediaSession' in navigator)) return;
  if (!t) { try { navigator.mediaSession.metadata = null; } catch(e) {} return; }
  const art = t.image ? artUrl(t.image) : '';
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title:  t.name  || '',
      artist: normArtist(t.artist) || '',
      album:  t.album || '',
      artwork: art ? [
        { src: art, sizes: '96x96',   type: 'image/jpeg' },
        { src: art, sizes: '256x256', type: 'image/jpeg' },
        { src: art, sizes: '512x512', type: 'image/jpeg' },
      ] : [],
    });
  } catch(e) {}
}

function bindMediaSessionActions() {
  if (!('mediaSession' in navigator)) return;
  const ms = navigator.mediaSession;
  try {
    ms.setActionHandler('play',          () => ctrlPlay());
    ms.setActionHandler('pause',         () => ctrlPlay());
    ms.setActionHandler('nexttrack',     () => ctrlNext());
    ms.setActionHandler('previoustrack', () => ctrlPrev());
    ms.setActionHandler('seekto', (d) => {
      if (Player.mode === 'navidrome' && Player.audio && d.seekTime != null) {
        Player.audio.currentTime = d.seekTime;
      }
    });
  } catch(e) {}
}

function updateStatusBar() {
  const n = S.filtered.length;
  const totalMs = S.filtered.reduce((s, t) => s + (t.duration_ms || 0), 0);
  $('#statusbar-text').textContent = n.toLocaleString() + ' songs, ' + fmtDurTotal(totalMs);
}

// ── Sorting ──
$$('#track-table th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (!col) return;
    if (S.sort.col === col) S.sort.asc = !S.sort.asc;
    else S.sort = { col, asc: true };
    applyFiltersAndRender();
  });
});

function updateSortArrows() {
  $$('#track-table th').forEach(th => {
    th.classList.remove('sorted');
    const existing = th.querySelector('.sort-arrow');
    if (existing) existing.remove();
    if (th.dataset.col === S.sort.col) {
      th.classList.add('sorted');
      const arrow = document.createElement('span');
      arrow.className = 'sort-arrow';
      arrow.textContent = S.sort.asc ? '\u25B2' : '\u25BC';
      th.appendChild(arrow);

function bindSvTableRows(container) {
  if (!container) container = $('#special-view');
  container.querySelectorAll('tr[data-uri]').forEach(tr => {
    tr.style.cursor = 'default';
    tr.onclick = function() {
      container.querySelectorAll('tr.selected').forEach(r => r.classList.remove('selected'));
      this.classList.add('selected');
    };
    tr.ondblclick = function() {
      const uri = this.dataset.uri;
      if (uri) {
        // Create a minimal track object for playback
        const fakeTrack = { uri: uri, name: this.cells[1]?.textContent || '?', artist: this.cells[2]?.textContent || '', album: '', duration_ms: 0, image: '', platform: 'spotify' };
        playTrack(fakeTrack, -1);
      }
    };
  });
}

function updateStatusBar_special(text) {
  $('#statusbar-text').textContent = text;
}

function timeAgo(ts) {
  if (!ts) return 'never';
  const s = Math.floor(Date.now()/1000 - ts);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm ago';
  return Math.floor(s/86400) + 'd ago';
}
function countdown(seconds) {
  if (seconds <= 0) return 'now';
  const h = Math.floor(seconds/3600), m = Math.floor((seconds%3600)/60);
  if (h > 0) return h + 'h ' + m + 'm';
  return m + 'm';
}

// ── Transport Controls ──
async function ctrlPlay() {
  const len = S.filtered.length;
  if (!len) return;
  if (Player.playing) {
    // Pause
    if (Player.mode === 'navidrome' && Player.audio) Player.audio.pause();
    else if (Player.mode === 'spotify' && Player.spotifyPlayer) Player.spotifyPlayer.pause();
    return;
  }
  // Resume or start
  if (Player.currentTrack && !Player.playing) {
    if (Player.mode === 'navidrome' && Player.audio) { Player.audio.play(); return; }
    if (Player.mode === 'spotify') {
      if (Player.spotifyPlayer && Player.spotifyReady) { Player.spotifyPlayer.resume(); return; }
      // SDK disconnected — reconnect and replay
      const sdkOk = await _ensureSpotifyConnected();
      if (sdkOk && Player.currentTrack) { playTrack(Player.currentTrack, Player.currentIdx, true); }
      return;
    }
  }
  // Nothing playing yet: play selected or first (creates new queue)
  const idx = S.selectedIdx >= 0 ? S.selectedIdx : 0;
  const t = S.filtered[idx];
  if (t) playTrack(t, idx);  // fromQueue=false → snapshots queue
}
function ctrlNext() {
  const q = Player.queue;
  const len = q.length;
  if (!len) return;
  const next = Math.min(Player.queueIdx + 1, len - 1);
  if (next !== Player.queueIdx) {
    Player.queueIdx = next;
    playTrack(q[next], next, true);
  }
}
function ctrlPrev() {
  const q = Player.queue;
  const len = q.length;
  if (!len) return;
  // If >3s into track, restart; otherwise previous
  if (Player.mode === 'navidrome' && Player.audio && Player.audio.currentTime > 3) {
    Player.audio.currentTime = 0; return;
  }
  const prev = Math.max(Player.queueIdx - 1, 0);
  if (prev !== Player.queueIdx) {
    Player.queueIdx = prev;
    playTrack(q[prev], prev, true);
  }
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const len = S.filtered.length;
  if (!len) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); selectRow(Math.min((S.selectedIdx < 0 ? -1 : S.selectedIdx) + 1, len - 1)); scrollToSelected(); }
  if (e.key === 'ArrowUp') { e.preventDefault(); selectRow(Math.max((S.selectedIdx < 0 ? 0 : S.selectedIdx) - 1, 0)); scrollToSelected(); }
  if (e.key === 'Enter' && S.selectedIdx >= 0) { const t = S.filtered[S.selectedIdx]; if (t) playTrack(t, S.selectedIdx); }
  if (e.key === ' ' && S.selectedIdx >= 0) { e.preventDefault(); ctrlPlay(); }
});

function scrollToSelected() {
  const wrap = $('#table-wrap');
  const rh = window.innerWidth <= 768 ? 24 : ROW_H;
  const top = S.selectedIdx * rh;
  const viewH = wrap.clientHeight;
  if (top < wrap.scrollTop) wrap.scrollTop = top;
  else if (top + rh > wrap.scrollTop + viewH) wrap.scrollTop = top + rh - viewH;
  renderVisibleRows();
}

// ── Resize Handles ──
(function() {
  function makeDrag(el, axis, onDrag, onEnd) {
    if (!el) return;
    let startPos;
    function begin(pos) { startPos = pos; el.classList.add('dragging'); }
    function move(pos) { onDrag(pos - startPos); }
    function end() { el.classList.remove('dragging'); if (onEnd) onEnd(); }
    el.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      begin(axis === 'x' ? e.clientX : e.clientY);
      const onMove = ev => move(axis === 'x' ? ev.clientX : ev.clientY);
      const onUp = () => { end(); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    el.addEventListener('touchstart', e => {
      e.stopPropagation();
      begin(axis === 'x' ? e.touches[0].clientX : e.touches[0].clientY);
    }, { passive: true });
    el.addEventListener('touchmove', e => {
      e.preventDefault();
      move(axis === 'x' ? e.touches[0].clientX : e.touches[0].clientY);
    }, { passive: false });
    el.addEventListener('touchend', () => end(), { passive: true });
  }

  // Sidebar resize
  const sb = $('#sidebar');
  let sbStartW;
  makeDrag($('#sidebar-resize'), 'x', delta => {
    if (!sbStartW) sbStartW = sb.offsetWidth;
    const w = Math.min(350, Math.max(120, sbStartW + delta));
    sb.style.width = w + 'px'; sb.style.minWidth = w + 'px';
  }, () => { sbStartW = 0; savePref('sidebar-w', sb.offsetWidth); });
  // Re-capture startW on mousedown
  const sbr = $('#sidebar-resize');
  if (sbr) sbr.addEventListener('mousedown', () => { sbStartW = sb.offsetWidth; }, true);

  // Browser column resize
  $$('.browser-col-resize').forEach(handle => {
    const idx = parseInt(handle.dataset.col);
    let cols, startWidths;
    handle.addEventListener('mousedown', () => {
      cols = [...$$('#browser .browser-col')];
      startWidths = cols.map(c => c.offsetWidth);
    }, true);
    makeDrag(handle, 'x', delta => {
      if (!cols) return;
      const newW = Math.max(60, startWidths[idx] + delta);
      const nextW = Math.max(60, startWidths[idx + 1] - delta);
      cols[idx].style.flex = '0 0 ' + newW + 'px';
      cols[idx + 1].style.flex = '0 0 ' + nextW + 'px';
    }, () => {
      const allCols = [...$$('#browser .browser-col')];
      savePref('browser-col-w', allCols.map(c => c.offsetWidth));
    });
  });

  // Browser pane vertical resize
  const browser = $('#browser');
  let brStartH;
  const bvr = $('#browser-v-resize');
  function captureBrH() {
    brStartH = browser.offsetHeight || 170;
  }
  if (bvr) {
    bvr.addEventListener('mousedown', captureBrH, true);
    bvr.addEventListener('touchstart', captureBrH, true);
  }
  // Restore browser height
  try {
    const savedBrH = localStorage.getItem('bbs-browser-h');
    if (savedBrH && browser) browser.style.height = savedBrH + 'px';
  } catch(e) {}
  makeDrag(bvr, 'y', delta => {
    if (!brStartH) brStartH = 170;
    const h = Math.min(400, Math.max(60, brStartH + delta));
    browser.style.height = h + 'px';
  }, () => {
    brStartH = 0;
    try { localStorage.setItem('bbs-browser-h', browser.offsetHeight); } catch(e) {}
  });

  // Column width persistence
  function saveColWidths() {
    const ths = [...$$('#track-table thead th')];
    const widths = ths.map(th => th.offsetWidth);
    try { localStorage.setItem('bbs-col-widths', JSON.stringify(widths)); } catch(e) {}
  }
  function restoreColWidths() {
    if (window.innerWidth <= 768) return;
    try {
      const w = JSON.parse(localStorage.getItem('bbs-col-widths'));
      if (!w) return;
      const ths = [...$$('#track-table thead th')];
      if (w.length !== ths.length) return;
      ths.forEach((th, i) => { th.style.width = w[i] + 'px'; });
    } catch(e) {}
  }
  restoreColWidths();

  // Table column resize (iTunes-style: left resizes, right compensates)
  $$('.th-resize').forEach(handle => {
    const idx = parseInt(handle.dataset.idx);
    let ths, startW, nextStartW;
    handle.addEventListener('mousedown', () => {
      ths = [...$$('#track-table thead th')];
      startW = ths[idx].offsetWidth;
      if (idx + 1 < ths.length) nextStartW = ths[idx + 1].offsetWidth;
    }, true);
    makeDrag(handle, 'x', delta => {
      if (!ths || idx + 1 >= ths.length) return;
      const minW = 25;
      const maxGrow = nextStartW - minW;
      const maxShrink = startW - minW;
      const d = Math.max(-maxShrink, Math.min(maxGrow, delta));
      ths[idx].style.width = (startW + d) + 'px';
      ths[idx + 1].style.width = (nextStartW - d) + 'px';
    }, () => {
      saveColWidths();
    });
  });
})();

// ── Persistence helpers ──
function savePref(k, v) { try { localStorage.setItem('bbs-' + k, JSON.stringify(v)); } catch(e) {} }
function loadPref(k, def) { try { const v = localStorage.getItem('bbs-' + k); return v !== null ? JSON.parse(v) : def; } catch(e) { return def; } }

function persistUIState() {
  savePref('view', S.view);
  savePref('sort', S.sort);
  savePref('browser-filter', S.browserFilter);
  savePref('search', S.searchQ);
}

// Patch navTo to persist
const _origNavTo = navTo;
navTo = function(el) { _origNavTo(el); persistUIState(); };

// Patch sort click to persist
const _origApply = applyFiltersAndRender;
applyFiltersAndRender = function() { _origApply(); persistUIState(); };

function setupMobileTable() {
  if (!isMobile()) return;

      else S.sort = { col, asc: true };

    });
  });
}

// ── Init ──
async function init() {
  Player.audio = $('#nd-audio');
  _initAudioEvents();
  bindMediaSessionActions();
  _initControlIcons();
  setupMobileTable();
  await initSidebar();
  // Restore persisted state
  const savedView = loadPref('view', 'all');
  const savedSort = loadPref('sort', { col: null, asc: true });
  const savedBF = loadPref('browser-filter', { genre: '', artist: '', album: '' });
  const savedSearch = loadPref('search', '');
  // Restore sidebar width
  const savedSbW = loadPref('sidebar-w', null);
  if (savedSbW) { const sb = $('#sidebar'); sb.style.width = savedSbW + 'px'; sb.style.minWidth = savedSbW + 'px'; }
  // Restore browser column widths
  const savedBCW = loadPref('browser-col-w', null);
  if (savedBCW) {
    const cols = [...$$('#browser .browser-col')];
    if (savedBCW.length === cols.length) cols.forEach((c, i) => { c.style.flex = '0 0 ' + savedBCW[i] + 'px'; });
  }
  // Apply saved view (only if its sidebar item is visible)
  const savedTarget = document.querySelector('.sb-item[data-source="' + savedView + '"]');
  if (savedTarget && savedTarget.style.display !== 'none') {
    $$('.sb-item').forEach(i => i.classList.remove('active'));
    savedTarget.classList.add('active');
    S.view = savedView;
  }
  S.sort = savedSort;
  S.browserFilter = savedBF;
  if (savedSearch) { S.searchQ = savedSearch; $('#search').value = savedSearch; $('#search-clear').style.display = 'block'; }
  populateBrowser();
  // Re-select browser filter items
  for (const key of ['genre', 'artist', 'album']) {
    if (S.browserFilter[key]) {
      const items = $$('#br-' + key + ' .browser-item');
      items.forEach(i => {
        i.classList.toggle('active', i.dataset.val === S.browserFilter[key]);
      });
    }
  }
  await loadView();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

  console.log('[BBS] UA:', navigator.userAgent);
  console.log('[BBS] Spotify SDK loaded:', !!window.Spotify);
  console.log('[BBS] EME available:', !!navigator.requestMediaKeySystemAccess);
}
init();
